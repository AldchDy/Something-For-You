<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Infinite World of Jejs</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #9b59b6; --glass: rgba(255, 255, 255, 0.1); }
        body, html { margin: 0; padding: 0; min-height: 100vh; font-family: 'Poppins', sans-serif; background: #0f0c29; background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29); color: #fff; overflow: hidden; }
        
        .screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: absolute; width: 100%; transition: all 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden { opacity: 0; visibility: hidden; transform: scale(0.9); }
        
        .btn-pixel { padding: 15px 35px; background: var(--primary); border: none; color: white; cursor: pointer; font-family: 'Press Start 2P', cursive; font-size: 10px; border-radius: 50px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: 0.3s; }
        .btn-pixel:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(155, 89, 182, 0.4); }

        /* Loading Bar */
        #loading-container { width: 280px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 20px; margin-top: 25px; }
        #loading-bar { height: 100%; width: 0%; background: #00d2ff; border-radius: 20px; box-shadow: 0 0 15px #00d2ff; }

        /* Hujan Tulisan */
        .falling-text { position: absolute; top: -50px; font-weight: 300; color: rgba(255,255,255,0.6); white-space: nowrap; animation: fall linear forwards; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* Photo Display - Glassmorphism Style */
        .photo-card { position: relative; width: 85%; max-width: 380px; padding: 15px; background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .photo-card img { width: 100%; height: 60vh; object-fit: contain; border-radius: 15px; transition: 0.5s ease-in-out; }
        .photo-info { margin-top: 15px; font-size: 14px; letter-spacing: 2px; color: #f1c40f; font-family: 'Press Start 2P'; font-size: 8px; }

        .nav-circle { background: var(--glass); border: 1px solid rgba(255,255,255,0.3); color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; transition: 0.3s; }
        .nav-circle:hover { background: var(--primary); }
        
        #btn-surprise { position: fixed; bottom: 30px; right: 30px; width: 85px; height: 85px; background: #ff4757; border: none; border-radius: 50%; color: white; font-family: 'Press Start 2P'; font-size: 8px; cursor: pointer; animation: pulse 2s infinite; box-shadow: 0 0 30px rgba(255, 71, 87, 0.6); z-index: 100; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(255, 71, 87, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); } }
    </style>
</head>
<body>

    <audio id="ultahLagu" src="musik.mp3" loop></audio>

    <div id="screen1" class="screen">
        <h2 style="font-family: 'Press Start 2P'; font-size: 14px; margin-bottom: 20px;">SYSTEM READY.</h2>
        <button class="btn-pixel" onclick="nextScreen(1, 2)">ENTER WORLD</button>
    </div>

    <div id="screen2" class="screen hidden">
        <h2 style="font-family: 'Press Start 2P'; font-size: 12px;">PLAYER IDENTIFICATION</h2>
        <input type="text" id="playerName" placeholder="Input User ID..." style="padding: 15px; border-radius: 30px; border: 1px solid var(--primary); width: 220px; margin: 30px; text-align: center; background: transparent; color: white;">
        <button class="btn-pixel" onclick="startLoading()">VALIDATE</button>
    </div>

    <div id="screen3" class="screen hidden">
        <h2 id="status-text" style="font-size: 12px; letter-spacing: 1px;">SEDANG MENYIAPKAN DUNIA...</h2>
        <div id="loading-container"><div id="loading-bar"></div></div>
        <p id="loading-text" style="font-size: 10px; margin-top: 15px; opacity: 0.6;">0%</p>
    </div>

    <div id="screen4" class="screen hidden">
        <div id="hujan-container"></div>
        <h1 id="judul-utama" class="hidden" style="font-size: 20px; color: #f1c40f; z-index: 20; font-family: 'Press Start 2P'; line-height: 1.5;">HAPPY BIRTHDAY,<br>PARTNER!</h1>
        <div id="siap-hadiah" class="hidden" style="z-index: 20; margin-top: 40px;">
            <p style="font-size: 14px; margin-bottom: 20px;">Ready to explore your memories?</p>
            <div style="display: flex; gap: 15px;">
                <button class="btn-pixel" onclick="showPhotos()">YES</button>
                <button class="btn-pixel" onclick="showPhotos()" style="background: #34495e;">YA</button>
            </div>
        </div>
    </div>

    <div id="screen5" class="screen hidden">
        <div class="photo-card">
            <img id="main-photo" src="foto1.png">
            <div class="photo-info" id="photo-index">MEMORY_LOG: 01/10</div>
            <div style="display: flex; justify-content: space-between; margin-top: 15px;">
                <button class="nav-circle" onclick="changePhoto(-1)">❮</button>
                <button class="nav-circle" onclick="changePhoto(1)">❯</button>
            </div>
        </div>
        <button id="btn-surprise" class="hidden" onclick="showFinal()">PUSH</button>
    </div>

    <div id="screen6" class="screen hidden">
        <h1 style="font-family: 'Press Start 2P'; color: #f1c40f; font-size: 18px; margin-bottom: 20px;">Selamat Ulang Tahun Jejs!</h1>
        <p style="font-weight: 300;">Doa terbaik buat kamu.</p>
        <p style="font-size: 12px; opacity: 0.5; margin-top: 10px;">Maaf hadiahnya cuman ginian.</p>
    </div>

    <script>
        let currentPhoto = 1;

        function nextScreen(curr, next) {
            document.getElementById('screen' + curr).classList.add('hidden');
            setTimeout(() => {
                document.getElementById('screen' + curr).style.display = 'none';
                document.getElementById('screen' + next).classList.remove('hidden');
            }, 1000);
        }

        function startLoading() {
            nextScreen(2, 3);
            let progress = 0;
            const statusTexts = ["SEDANG MENYIAPKAN DUNIA", "MENCARI NAMA YANG SAMA", "DUNIA DITEMUKAN", "BERSIAP MEMASUKI DUNIA"];
            
            let interval = setInterval(() => {
                progress += 1;
                document.getElementById('loading-bar').style.width = progress + "%";
                document.getElementById('loading-text').innerText = progress + "%";
                
                if(progress < 25) document.getElementById('status-text').innerText = statusTexts[0];
                else if(progress < 50) document.getElementById('status-text').innerText = statusTexts[1];
                else if(progress < 75) document.getElementById('status-text').innerText = statusTexts[2];
                else document.getElementById('status-text').innerText = statusTexts[3];

                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(startBirthday, 500);
                }
            }, 60);
        }

        function startBirthday() {
            nextScreen(3, 4);
            document.getElementById('ultahLagu').play();
            
            const wishes = ["Happy Birthday", "Selamat Ulang Tahun", "Sugeng Ambal Warsa", "Otanjoubi Omedetou", "Saeng-il Chukha", "Joyeux Anniversaire", "Alles Gute", "Feliz Cumpleaños", "Buon Compleanno", "Tillykke", "Grattis", "Sveikinu", "Parabéns", "Gelukkige verjaardag"];
            
            // Hujan bahasa lebih lama (8 detik)
            let count = 0;
            let rainInterval = setInterval(() => {
                const text = document.createElement('div');
                text.className = 'falling-text';
                text.innerText = wishes[Math.floor(Math.random() * wishes.length)];
                text.style.left = Math.random() * 85 + "vw";
                text.style.animationDuration = (Math.random() * 4 + 4) + "s";
                document.getElementById('hujan-container').appendChild(text);
                count++;
                if (count > 80) clearInterval(rainInterval); // Jumlah teks lebih banyak
            }, 150);

            setTimeout(() => {
                document.getElementById('judul-utama').classList.remove('hidden');
                setTimeout(() => { document.getElementById('siap-hadiah').classList.remove('hidden'); }, 3000);
            }, 6000); // Judul muncul setelah 6 detik hujan teks
        }

        function showPhotos() {
            nextScreen(4, 5);
            setTimeout(() => { document.getElementById('btn-surprise').classList.remove('hidden'); }, 5000);
        }

        function changePhoto(dir) {
            const img = document.getElementById('main-photo');
            img.style.opacity = '0'; // Efek transisi halus
            setTimeout(() => {
                currentPhoto += dir;
                if (currentPhoto < 1) currentPhoto = 10;
                if (currentPhoto > 10) currentPhoto = 1;
                img.src = `foto${currentPhoto}.png`;
                document.getElementById('photo-index').innerText = `MEMORY_LOG: 0${currentPhoto}/10`.replace('010', '10');
                img.style.opacity = '1';
            }, 300);
        }

        function showFinal() {
            nextScreen(5, 6);
            setInterval(() => {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#00d2ff', '#9b59b6', '#f1c40f'] });
            }, 1500);
        }
    </script>
</body>
</html>
