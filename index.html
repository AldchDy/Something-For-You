<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate Quest</title>
    <!-- Kita pakai library kembang api sederhana -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Press Start 2P', cursive, sans-serif; background: #000; color: #fff; overflow: hidden; }
        .screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: absolute; width: 100%; transition: 0.5s; }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        
        /* Tombol Style Game */
        .btn-pixel { padding: 15px 30px; background: #2ecc71; border: 4px solid #fff; color: white; cursor: pointer; font-family: inherit; margin: 10px; }
        .btn-pixel:hover { background: #27ae60; transform: scale(1.05); }

        /* Loading Bar */
        #loading-container { width: 300px; height: 20px; border: 2px solid #fff; margin-top: 20px; }
        #loading-bar { height: 100%; width: 0%; background: #e74c3c; }

        /* Hujan Tulisan */
        .falling-text { position: absolute; top: -50px; font-size: 20px; white-space: nowrap; animation: fall linear forwards; z-index: 10; }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* Slide Foto */
        .photo-container { position: relative; width: 80%; max-width: 500px; height: 400px; border: 10px solid white; background: #222; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.5); border: none; padding: 10px; cursor: pointer; }
        
        #btn-surprise { position: fixed; bottom: 20px; right: 20px; padding: 10px; background: #f1c40f; color: #000; border-radius: 50%; width: 100px; height: 100px; font-size: 10px; cursor: pointer; animation: pulse 1s infinite; z-index: 100; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
    <!-- Font bergaya game -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <audio id="ultahLagu" src="musik.mp3"></audio>

    <!-- STEP 1 & 2: START & NAMA -->
    <div id="screen1" class="screen">
        <h1 style="color: #f1c40f;">LEVEL 1</h1>
        <p>A New Adventure Awaits...</p>
        <button class="btn-pixel" onclick="nextScreen(1, 2)">START GAME</button>
    </div>

    <div id="screen2" class="screen hidden">
        <h2>IDENTIFY PLAYER</h2>
        <input type="text" id="playerName" placeholder="Input Name..." style="padding: 10px; font-family: inherit;">
        <button class="btn-pixel" onclick="startLoading()">CONFIRM</button>
    </div>

    <!-- STEP 4: LOADING -->
    <div id="screen3" class="screen hidden">
        <h2 id="status-text">INITIALIZING...</h2>
        <div id="loading-container">
            <div id="loading-bar"></div>
        </div>
        <p id="loading-text">0%</p>
    </div>

    <!-- STEP 6-9: HUJAN BAHASA & PERTANYAAN -->
    <div id="screen4" class="screen hidden">
        <div id="hujan-container"></div>
        <h1 id="judul-utama" class="hidden" style="font-size: 30px; color: #ff4757; z-index: 20;">SELAMAT ULANG TAHUN!</h1>
        <div id="siap-hadiah" class="hidden" style="z-index: 20;">
            <p>Apakah kamu siap menerima hadiah?</p>
            <button class="btn-pixel" onclick="showPhotos()">YA</button>
            <button class="btn-pixel" onclick="showPhotos()">YES</button>
        </div>
    </div>

    <!-- STEP 10-12: SLIDE FOTO -->
    <div id="screen5" class="screen hidden">
        <div class="photo-container">
            <img id="main-photo" src="foto1.png">
            <button class="nav-btn" style="left: 0;" onclick="changePhoto(-1)">◀</button>
            <button class="nav-btn" style="right: 0;" onclick="changePhoto(1)">▶</button>
        </div>
        <p id="photo-index">Photo 1 of 10</p>
        <button id="btn-surprise" class="hidden" onclick="celebrate()">SURPRISE!</button>
    </div>

    <script>
        let currentPhoto = 1;

        function nextScreen(curr, next) {
            document.getElementById('screen' + curr).classList.add('hidden');
            document.getElementById('screen' + next).classList.remove('hidden');
        }

        function startLoading() {
            nextScreen(2, 3);
            let progress = 0;
            let interval = setInterval(() => {
                progress += 2;
                document.getElementById('loading-bar').style.width = progress + "%";
                document.getElementById('loading-text').innerText = progress + "%";
                if (progress >= 100) {
                    clearInterval(interval);
                    startBirthday();
                }
            }, 50);
        }

        function startBirthday() {
            nextScreen(3, 4);
            document.getElementById('ultahLagu').play();
            
            // Hujan bahasa
            const languages = ["Happy Birthday", "Sugeng Ambal Warsa", "Otanjoubi Omedetou", "Saeng-il Chukha", "Joyeux Anniversaire", "Alles Gute", "Feliz Cumpleaños"];
            let count = 0;
            let rainInterval = setInterval(() => {
                const text = document.createElement('div');
                text.className = 'falling-text';
                text.innerText = languages[Math.floor(Math.random() * languages.length)];
                text.style.left = Math.random() * 90 + "vw";
                text.style.animationDuration = (Math.random() * 2 + 2) + "s";
                document.getElementById('hujan-container').appendChild(text);
                count++;
                if (count > 30) clearInterval(rainInterval);
            }, 300);

            setTimeout(() => {
                document.getElementById('judul-utama').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('siap-hadiah').classList.remove('hidden');
                }, 2000);
            }, 4000);
        }

        function showPhotos() {
            nextScreen(4, 5);
            setTimeout(() => {
                document.getElementById('btn-surprise').classList.remove('hidden');
            }, 5000); // Tombol surprise muncul setelah 5 detik di slide foto
        }

        function changePhoto(dir) {
            currentPhoto += dir;
            if (currentPhoto < 1) currentPhoto = 10;
            if (currentPhoto > 10) currentPhoto = 1;
            document.getElementById('main-photo').src = `foto${currentPhoto}.png`;
            document.getElementById('photo-index').innerText = `Photo ${currentPhoto} of 10`;
        }

        function celebrate() {
            var duration = 15 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
