<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>JEJS — The Infinite World</title>
<style>
@import "https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap";

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button{cursor:pointer;border:none;background:none}

:root{
  --c-bg:#060610;
  --c-primary:#00e5ff;
  --c-secondary:#7c4dff;
  --c-gold:#ffd600;
  --c-accent:#ff4081;
  --c-text:#e0f7fa;
  --c-border:#00e5ff59;
  --font-mono:"Share Tech Mono",monospace;
  --font-display:"Orbitron",sans-serif;
  --font-body:"Exo 2",sans-serif;
}

body{
  background:var(--c-bg);
  color:var(--c-text);
  font-family:var(--font-body);
  width:100vw;
  height:100dvh;
  overflow:hidden;
  position:relative;
}

/* ─── SHARED ─────────────────────────────────────── */
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  width:100%;height:100%;
}

.grid-bg{
  pointer-events:none;position:absolute;inset:0;
  background-image:
    linear-gradient(#00e5ff0a 1px,transparent 1px),
    linear-gradient(90deg,#00e5ff0a 1px,transparent 1px);
  background-size:40px 40px;
}
.grid-bg.dim{opacity:.4}

.stars-layer{
  pointer-events:none;position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 10% 20%,#fffc 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 60%,#fff9 0%,transparent 100%),
    radial-gradient(1px 1px at 50% 10%,#ffffffe6 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 80%,#ffffff80 0%,transparent 100%),
    radial-gradient(1px 1px at 85% 35%,#ffffffb3 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 45%,#00e5ff99 0%,transparent 100%);
  animation:starsTwinkle 4s ease-in-out infinite alternate;
}
@keyframes starsTwinkle{0%{opacity:.6}100%{opacity:1}}

.corner-deco{
  font-family:var(--font-mono);color:#00e5ff4d;
  padding:10px;font-size:14px;position:absolute;
}
.corner-deco.tl{top:0;left:0}
.corner-deco.tr{top:0;right:0;transform:scaleX(-1)}
.corner-deco.bl{bottom:0;left:0;transform:scaleY(-1)}
.corner-deco.br{bottom:0;right:0;transform:scale(-1)}

/* ─── INTRO ─────────────────────────────────────── */
.screen-intro{background:radial-gradient(#0d0d2b 0%,#060610 70%)}

.intro-content{
  position:relative;z-index:10;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  padding:24px;
}
.intro-content.glitch{animation:glitch .15s steps(2,end) forwards}
@keyframes glitch{
  0%{filter:none;transform:translate(0)}
  25%{filter:hue-rotate(90deg);transform:translate(-4px,2px)}
  50%{filter:hue-rotate(-90deg);transform:translate(4px,-2px)}
  75%{filter:brightness(2);transform:translate(-2px,0)}
  100%{filter:none;transform:translate(0)}
}

.game-eyebrow{
  font-family:var(--font-mono);letter-spacing:.3em;
  color:#00e5ff80;font-size:11px;
}
.game-logo{
  font-family:var(--font-display);letter-spacing:.1em;
  font-size:clamp(52px,14vw,100px);font-weight:900;line-height:1;
  animation:logoGlow 2s ease-in-out infinite alternate;
}
@keyframes logoGlow{
  0%{text-shadow:0 0 20px var(--c-primary),0 0 50px var(--c-primary)}
  100%{text-shadow:0 0 30px var(--c-secondary),0 0 70px var(--c-secondary),0 0 100px var(--c-secondary)}
}
.logo-bracket{color:var(--c-secondary)}
.logo-text{color:var(--c-primary)}

.game-title{
  font-family:var(--font-display);letter-spacing:.45em;
  color:#ffffffa6;font-size:clamp(11px,2.8vw,19px);font-weight:400;
}
.game-subtitle{
  font-family:var(--font-mono);color:var(--c-gold);
  letter-spacing:.2em;min-height:1.5em;font-size:clamp(10px,2vw,14px);
}
.cursor{color:var(--c-gold);animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.decorative-line{font-family:var(--font-mono);color:#00e5ff40;font-size:11px}

.btn-start{
  font-family:var(--font-display);letter-spacing:.25em;
  border:2px solid var(--c-primary);color:var(--c-primary);
  background:transparent;padding:14px 52px;
  font-size:clamp(12px,2.5vw,15px);font-weight:700;
  transition:color .3s;position:relative;overflow:hidden;
  animation:btnPulse 2.5s ease-in-out infinite;
}
@keyframes btnPulse{
  0%,100%{box-shadow:0 0 10px var(--c-primary)}
  50%{box-shadow:0 0 30px var(--c-primary),0 0 60px #00e5ff4d}
}
.btn-start::before{
  content:"";background:var(--c-primary);z-index:-1;
  transition:transform .3s;position:absolute;inset:0;
  transform:translateX(-100%);
}
.btn-start:hover{color:var(--c-bg)}
.btn-start:hover::before{transform:translateX(0)}
.version-tag{font-family:var(--font-mono);color:#fff3;letter-spacing:.2em;font-size:9px}

/* ─── NAME SCREEN ─────────────────────────────────────── */
.screen-name{background:radial-gradient(at 30% 70%,#0d1a2e 0%,#060610 60%)}

.name-panel{
  border:1px solid var(--c-border);
  backdrop-filter:blur(12px);
  background:#00e5ff08;
  width:min(460px,90vw);
  z-index:10;
}
.panel-header{
  border-bottom:1px solid var(--c-border);
  font-family:var(--font-mono);letter-spacing:.15em;
  color:var(--c-primary);background:#00e5ff14;
  padding:12px 20px;font-size:12px;
}
.panel-body{
  display:flex;flex-direction:column;gap:18px;
  padding:28px 22px;
}
.id-row{
  font-family:var(--font-mono);background:#0000004d;
  border:1px solid #00e5ff26;
  display:flex;align-items:center;gap:12px;
  padding:12px;font-size:12px;
}
.id-label{color:#fff6}
.id-value{color:var(--c-gold);letter-spacing:.2em}

.name-input{
  border:1px solid var(--c-border);width:100%;
  color:var(--c-text);font-family:var(--font-mono);
  letter-spacing:.1em;text-transform:uppercase;
  background:#00000080;outline:none;
  padding:12px 16px;font-size:13px;
  transition:border-color .3s,box-shadow .3s;
}
.name-input:focus{border-color:var(--c-primary);box-shadow:0 0 15px #00e5ff33}
.name-input::placeholder{color:#fff3}
.name-hint{
  font-family:var(--font-mono);color:#ffffff4d;
  text-align:center;letter-spacing:.1em;font-size:9px;
}
.btn-validate{
  background:linear-gradient(135deg,var(--c-secondary),var(--c-primary));
  color:#fff;font-family:var(--font-display);letter-spacing:.2em;
  border:none;padding:13px;font-size:13px;font-weight:700;
  transition:all .3s;
}
.btn-validate:disabled{opacity:.3;cursor:not-allowed}
.btn-validate:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 8px 25px #00e5ff66}

/* ─── LOADING ─────────────────────────────────────── */
.screen-loading{background:#060610}

.loading-content{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:20px;
  width:min(480px,90vw);padding:20px;
}
.loading-spinner-wrap{width:60px;height:60px;position:relative}
.sp-bar{
  background:var(--c-primary);transform-origin:2px 28px;
  opacity:0;border-radius:2px;width:4px;height:16px;
  margin-top:-28px;margin-left:-2px;
  animation:spinFade 1s linear infinite;
  position:absolute;top:50%;left:50%;
}
@keyframes spinFade{0%{opacity:1}100%{opacity:0}}

.loading-stage{
  font-family:var(--font-mono);color:var(--c-primary);
  letter-spacing:.1em;text-align:center;
  font-size:clamp(9px,2vw,11px);
  animation:stagePulse 1s ease-in-out infinite;
}
@keyframes stagePulse{0%,100%{opacity:1}50%{opacity:.5}}

.loading-bar-track{
  background:#ffffff0d;border:1px solid #00e5ff33;
  width:100%;height:5px;position:relative;overflow:hidden;
}
.loading-bar-fill{
  background:linear-gradient(90deg,var(--c-secondary),var(--c-primary));
  height:100%;box-shadow:0 0 10px var(--c-primary);
  transition:width .1s linear;position:relative;
}
.loading-bar-fill::after{
  content:"";background:#fff;width:2px;height:13px;
  position:absolute;top:-4px;right:0;box-shadow:0 0 8px #fff;
}
.loading-pct{
  font-family:var(--font-mono);color:var(--c-gold);
  text-align:right;margin-top:5px;font-size:11px;
}
.loading-log{
  display:flex;flex-direction:column;gap:4px;
  width:100%;max-height:110px;overflow:hidden;
}
.log-line{
  font-family:var(--font-mono);color:#ffffff59;font-size:9px;
  animation:logSlide .3s ease-out;
}
@keyframes logSlide{0%{opacity:0;transform:translateX(-10px)}100%{opacity:1;transform:none}}
.log-ok{color:#69ff47;margin-right:8px}
.loading-player{font-family:var(--font-mono);color:#ffffff4d;letter-spacing:.1em;font-size:10px}
.loading-player span{color:var(--c-gold)}

/* ─── REVEAL ─────────────────────────────────────── */
.screen-reveal{background:radial-gradient(#0d0d2b 0%,#060610 100%);overflow:hidden}

.wishes-rain{pointer-events:none;position:absolute;inset:0;z-index:1}
.wish-item{
  font-family:var(--font-body);color:#ffffff21;white-space:nowrap;
  font-weight:300;position:absolute;top:-60px;
  animation:wishFall linear forwards;
}
@keyframes wishFall{to{transform:translateY(120vh)}}

.reveal-title-wrap{
  position:relative;z-index:10;text-align:center;
  animation:titleReveal 1.2s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes titleReveal{0%{opacity:0;transform:scale(.7)translateY(30px)}100%{opacity:1;transform:none}}
.reveal-badge{
  font-family:var(--font-mono);letter-spacing:.3em;
  color:var(--c-gold);opacity:.8;margin-bottom:14px;font-size:10px;
}
.reveal-title{display:flex;flex-direction:column;align-items:center;gap:4px}
.rt-1{
  font-family:var(--font-display);letter-spacing:.5em;
  color:#ffffffa6;text-shadow:0 0 30px var(--c-primary);
  font-size:clamp(20px,5vw,48px);font-weight:400;
}
.rt-2{
  font-family:var(--font-display);letter-spacing:.15em;
  color:var(--c-primary);
  text-shadow:0 0 40px var(--c-primary),0 0 80px #00e5ff66;
  font-size:clamp(24px,6vw,58px);font-weight:900;line-height:1;
}
.rt-3{
  font-family:var(--font-display);color:var(--c-gold);
  letter-spacing:.05em;font-size:clamp(28px,7.5vw,68px);font-weight:900;
  animation:nameGlow 1.5s ease-in-out infinite alternate;
}
@keyframes nameGlow{
  0%{text-shadow:0 0 40px var(--c-gold),0 0 80px #ffd6004d}
  100%{text-shadow:0 0 60px var(--c-gold),0 0 120px #ffd60099}
}

.reveal-question{
  position:relative;z-index:10;text-align:center;margin-top:32px;
  animation:slideUp .8s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes slideUp{0%{opacity:0;transform:translateY(40px)}100%{opacity:1;transform:translateY(0)}}
.q-text{font-family:var(--font-body);color:#ffffffd9;margin-bottom:20px;font-size:clamp(13px,2.8vw,18px);font-weight:300}
.q-buttons{display:flex;justify-content:center;gap:14px}
.btn-answer{
  border:2px solid var(--c-primary);color:var(--c-primary);
  font-family:var(--font-display);background:#00000080;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:12px 28px;transition:all .3s;position:relative;overflow:hidden;
}
.btn-answer.alt{border-color:var(--c-gold);color:var(--c-gold)}
.btn-answer::before{
  content:"";background:var(--c-primary);transform-origin:bottom;
  z-index:-1;transition:transform .3s;position:absolute;inset:0;transform:scaleY(0);
}
.btn-answer.alt::before{background:var(--c-gold)}
.btn-answer:hover{color:var(--c-bg);transform:translateY(-3px)}
.btn-answer:hover::before{transform:scaleY(1)}
.ans-main{letter-spacing:.2em;font-size:18px;font-weight:700}
.ans-sub{font-family:var(--font-mono);opacity:.7;font-size:8px}

/* ─── PHOTOS — REDESIGNED ───────────────────────── */
.screen-photos{
  background:#060610;
  flex-direction:column;
  align-items:stretch;
  display:flex;
  overflow:hidden;
}

.photo-hud{
  background:linear-gradient(180deg,#0a0a1a 0%,transparent 100%);
  border-bottom:1px solid #00e5ff1a;
  flex-shrink:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 20px;
  position:relative;z-index:20;
}
.hud-title{
  font-family:var(--font-mono);color:var(--c-primary);
  letter-spacing:.15em;font-size:11px;
}
.hud-counter{
  font-family:var(--font-display);color:var(--c-gold);
  letter-spacing:.1em;font-size:13px;font-weight:700;
}

/* Main cinematic area */
.photo-stage{
  flex:1;
  position:relative;
  overflow:hidden;
  min-height:0;
}

/* Full blurred background */
.photo-bg{
  position:absolute;inset:-30px;
  background-size:cover;background-position:center;
  filter:blur(40px) brightness(.3) saturate(1.5);
  transition:background-image .5s ease;
  transform:scale(1.1);
}

/* Center card */
.photo-main{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  padding:12px;
  z-index:5;
}

.photo-card-wrap{
  position:relative;
  height:100%;
  max-height:100%;
  display:flex;align-items:center;justify-content:center;
}

.photo-card{
  position:relative;
  background:#0a0a18;
  border:1px solid #00e5ff30;
  overflow:hidden;
  box-shadow:
    0 0 0 1px #00e5ff15,
    0 20px 60px #00000080,
    0 0 100px #00e5ff0a;
  transition:opacity .4s,transform .4s;
  display:flex;flex-direction:column;
  /* Responsive sizing */
  width:min(320px, calc(100vw - 80px));
  max-height:calc(100% - 8px);
}

@media(min-width:600px){
  .photo-card{width:min(380px, calc(100vw - 120px))}
}

.photo-card.exit-left{opacity:0;transform:translateX(-12%) scale(.95)}
.photo-card.exit-right{opacity:0;transform:translateX(12%) scale(.95)}
.photo-card.enter{opacity:1;transform:none}

/* Corner decorations */
.pc{
  position:absolute;border-color:var(--c-primary);z-index:5;
  pointer-events:none;border-style:solid;width:14px;height:14px;
}
.pc.tl{border-width:2px 0 0 2px;top:0;left:0}
.pc.tr{border-width:2px 2px 0 0;top:0;right:0}
.pc.bl{border-width:0 0 2px 2px;bottom:0;left:0}
.pc.br{border-width:0 2px 2px 0;bottom:0;right:0}

.photo-img-wrap{
  flex:1;overflow:hidden;min-height:0;
  display:flex;align-items:center;justify-content:center;
  background:#0a0a18;
}
.photo-img{
  width:100%;height:100%;
  object-fit:cover;display:block;
}

.photo-meta{
  flex-shrink:0;
  background:linear-gradient(0deg,#000000cc 0%,#00000040 100%);
  border-top:1px solid #00e5ff1a;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:flex-end;
  gap:8px;
}
.photo-caption{
  font-family:var(--font-body);color:#ffffffb3;
  font-size:clamp(10px,2.5vw,12px);font-style:italic;font-weight:300;
  line-height:1.4;flex:1;
}
.photo-num{
  font-family:var(--font-display);color:var(--c-gold);
  letter-spacing:.1em;background:#ffd6001a;
  border:1px solid #ffd6004d;
  flex-shrink:0;padding:3px 8px;font-size:10px;font-weight:700;
}

/* Side nav buttons */
.photo-nav-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  z-index:15;
  width:36px;height:36px;
  color:var(--c-primary);
  background:#00e5ff0f;
  border:1px solid #00e5ff4d;
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;line-height:1;
  transition:all .25s;
  -webkit-tap-highlight-color:transparent;
}
.photo-nav-btn.prev{left:8px}
.photo-nav-btn.next{right:8px}
.photo-nav-btn:hover{background:var(--c-primary);color:var(--c-bg);box-shadow:0 0 20px #00e5ff80}
.photo-nav-btn:active{transform:translateY(-50%) scale(.92)}

/* Dot strip */
.photo-strip{
  flex-shrink:0;
  display:flex;justify-content:center;align-items:center;
  gap:7px;padding:8px 16px;
  background:linear-gradient(0deg,#0a0a1a 0%,transparent 100%);
  position:relative;z-index:20;
}
.strip-dot{
  background:#ffffff26;width:7px;height:7px;border-radius:0;
  border:none;transition:all .25s;cursor:pointer;
  flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.strip-dot.active{background:var(--c-primary);box-shadow:0 0 8px var(--c-primary);transform:scale(1.4)}
.strip-dot:hover{background:#fff6}

/* Swipe hint (touch only) */
.swipe-hint{
  font-family:var(--font-mono);color:#fff3;letter-spacing:.15em;font-size:9px;
  text-align:center;padding-bottom:4px;flex-shrink:0;
  position:relative;z-index:20;
}
@media(hover:hover){.swipe-hint{display:none}}

/* SURPRISE button — fixed at bottom, no overlap */
.surprise-bar{
  flex-shrink:0;
  background:#060610f2;
  border-top:1px solid #ff40814d;
  display:flex;justify-content:center;
  padding:10px 16px;
  padding-bottom:max(10px, env(safe-area-inset-bottom));
  position:relative;z-index:25;
  animation:surpriseBarIn .6s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes surpriseBarIn{0%{opacity:0;transform:translateY(100%)}100%{opacity:1;transform:none}}

.btn-surprise{
  color:#fff;font-family:var(--font-display);
  background:linear-gradient(135deg,#ff4081,#c2185b);
  border:1px solid #ffffff40;border-radius:4px;
  display:flex;align-items:center;gap:10px;
  padding:10px 32px;
  transition:transform .2s;
  animation:surprisePulse 1.8s ease-in-out infinite;
  -webkit-tap-highlight-color:transparent;
}
@keyframes surprisePulse{
  0%,100%{box-shadow:0 0 0 0 #ff4081b3}
  50%{box-shadow:0 0 0 10px #ff408100}
}
.btn-surprise:hover{transform:scale(1.04)}
.btn-surprise:active{transform:scale(.97)}
.surprise-star{font-size:20px}
.surprise-label{letter-spacing:.25em;font-size:13px;font-weight:700}

/* Photo fallback */
.photo-fallback{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;width:100%;height:100%;
}
.fb-icon{font-size:36px;opacity:.5}
.fb-label{
  font-family:var(--font-display);color:#ffffff4d;
  letter-spacing:.2em;font-size:14px;font-weight:700;
}

/* ─── FINAL ─────────────────────────────────────── */
.screen-final{background:#060610;overflow:hidden}

.fw-layer{pointer-events:none;position:absolute;inset:0}
.firework{
  position:absolute;width:6px;height:6px;border-radius:50%;
  background:var(--c);
  box-shadow:0 0 6px var(--c),0 0 12px var(--c);
  animation:fwBurst 1.4s ease-out forwards;
}
@keyframes fwBurst{
  0%{opacity:1;transform:scale(0)}
  30%{opacity:1;transform:scale(8)}
  60%{opacity:.5;transform:scale(15)}
  100%{opacity:0;transform:scale(25)}
}
.particle{
  border-radius:50%;position:absolute;
  animation:particleMove 1.2s ease-out forwards;
}
@keyframes particleMove{
  0%{opacity:1;transform:translate(0,0)}
  100%{transform:translate(var(--vx),var(--vy));opacity:0}
}

.final-content{
  position:relative;z-index:10;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  padding:24px;
  animation:finalReveal 1.5s ease-out forwards;
}
@keyframes finalReveal{0%{opacity:0;transform:translateY(30px)scale(.95)}100%{opacity:1;transform:none}}
.final-stars{
  color:var(--c-gold);letter-spacing:10px;font-size:22px;
  animation:starsFloat 3s ease-in-out infinite alternate;
}
@keyframes starsFloat{0%{transform:translateY(0)}100%{transform:translateY(-8px)}}
.final-title{
  font-family:var(--font-display);letter-spacing:.3em;
  color:#fffc;font-size:clamp(20px,5vw,40px);font-weight:400;
}
.final-name{
  font-family:var(--font-display);color:var(--c-gold);
  text-shadow:0 0 50px #ffd600cc;
  font-size:clamp(34px,9vw,78px);font-weight:900;
  animation:nameGlow 1.5s ease-in-out infinite alternate;
}
.final-msg{
  font-family:var(--font-body);color:#ffffffbf;
  max-width:380px;font-size:clamp(13px,2.5vw,17px);
  font-weight:300;line-height:1.8;
}
.final-small{font-family:var(--font-mono);color:#ffffff4d;letter-spacing:.1em;font-size:10px}
.final-badge{
  font-family:var(--font-mono);color:#00e5ff99;
  letter-spacing:.15em;border:1px solid #00e5ff33;
  margin-top:8px;padding:8px 20px;font-size:10px;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import{jsx as $,jsxs as jj,Fragment as Frag}from'https://esm.sh/react@19/jsx-runtime';
import React,{useState,useEffect,useRef,useCallback}from'https://esm.sh/react@19';
import{createRoot}from'https://esm.sh/react-dom@19/client';

const PLAYER_NAME = "JESSICA";

const WISHES = ["Happy Birthday","Selamat Ulang Tahun","Sugeng Ambal Warsa","Otanjoubi Omedetou","Saeng-il Chukha Hae","Joyeux Anniversaire","Alles Gute zum Geburtstag","Feliz Cumpleaños","Buon Compleanno","Gelukkige Verjaardag","Parabéns","Tillykke med Fødselsdagen","Grattis på Födelsedagen","С Днём Рождения","生日快乐","お誕生日おめでとう","عيد ميلاد سعيد","जन्मदिन मुबारक","Mutlu Yıllar","Hyväa Syntymäpäivää"];

const LOADING_STAGES=[
  {text:"INITIALIZING WORLD ENGINE...",pct:0},
  {text:"LOADING PLAYER DATA...",pct:20},
  {text:"SCANNING MEMORY ARCHIVE...",pct:45},
  {text:"DECRYPTING HIDDEN FILES...",pct:65},
  {text:"COMPILING SECRET PROTOCOL...",pct:82},
  {text:"ALL SYSTEMS ONLINE. LAUNCHING...",pct:96},
];

const PHOTOS=Array.from({length:10},(_,i)=>({
  id:i+1,
  src:`foto${i+1}.png`,
  label:`${String(i+1).padStart(2,'0')} / 10`,
}));

const CAPTIONS=["A memory worth keeping forever.","Time flies, but moments stay.","This one always makes me smile.","Look how far we've come.","Some days are just different.","Captured in the best of times.","Every frame tells a story.","One of my favorites.","A chapter I won't forget.","And here we are. ✦"];

const TYPING_TEXT = "ENTER THE WORLD";

function App(){
  const[screen,setScreen]=useState('intro');
  const[nameVal,setNameVal]=useState('');
  const[loadPct,setLoadPct]=useState(0);
  const[stageIdx,setStageIdx]=useState(0);
  const[wishes,setWishes]=useState([]);
  const[showTitle,setShowTitle]=useState(false);
  const[showQuestion,setShowQuestion]=useState(false);
  const[photoIdx,setPhotoIdx]=useState(0);
  const[exitDir,setExitDir]=useState(null);
  const[showSurprise,setShowSurprise]=useState(false);
  const[fireworks,setFireworks]=useState([]);
  const[particles,setParticles]=useState([]);
  const[isGlitch,setIsGlitch]=useState(false);
  const[typedText,setTypedText]=useState('');
  
  const audioRef=useRef(null);
  const fwInterval=useRef(null);
  const touchStart=useRef(null);

  // Intro glitch interval
  useEffect(()=>{
    if(screen!=='intro')return;
    const t=setInterval(()=>{setIsGlitch(true);setTimeout(()=>setIsGlitch(false),150)},3500);
    return()=>clearInterval(t);
  },[screen]);

  // Typing animation
  useEffect(()=>{
    if(screen!=='intro')return;
    setTypedText('');
    let i=0;
    const t=setInterval(()=>{
      setTypedText(TYPING_TEXT.slice(0,i+1));
      if(++i>=TYPING_TEXT.length)clearInterval(t);
    },100);
    return()=>clearInterval(t);
  },[screen]);

  function startLoading(){
    setScreen('loading');
    setLoadPct(0);setStageIdx(0);
    let p=0;
    const t=setInterval(()=>{
      p+=Math.random()*2+0.4;
      if(p>100)p=100;
      setLoadPct(Math.floor(p));
      setStageIdx(LOADING_STAGES.reduce((acc,s,i)=>p>=s.pct?i:acc,0));
      if(p>=100){clearInterval(t);setTimeout(()=>startReveal(),900);}
    },60);
  }

  function startReveal(){
    setScreen('reveal');
    if(audioRef.current){audioRef.current.volume=0.6;audioRef.current.play().catch(()=>{});}
    setWishes(Array.from({length:70},(_,i)=>({
      id:i,text:WISHES[i%WISHES.length],
      x:Math.random()*93,dur:Math.random()*5+6,
      delay:Math.random()*8,size:Math.random()*7+10,
    })));
    setTimeout(()=>setShowTitle(true),4500);
    setTimeout(()=>setShowQuestion(true),7000);
  }

  function goPhotos(){
    setScreen('photos');
    setTimeout(()=>setShowSurprise(true),14000);
  }

  function navigate(dir){
    if(exitDir)return;
    setExitDir(dir);
    setTimeout(()=>{
      setPhotoIdx(i=>dir==='right'?i>=PHOTOS.length-1?0:i+1:i<=0?PHOTOS.length-1:i-1);
      setExitDir(null);
    },380);
  }

  const goFinal=useCallback(()=>{
    setScreen('final');
    let id=0;
    fwInterval.current=setInterval(()=>{
      const x=Math.random()*90+5,y=Math.random()*65+5;
      const colors=['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98FB98','#FF9FF3','#54A0FF'];
      const c=colors[Math.floor(Math.random()*colors.length)];
      const fid=id++;
      setFireworks(f=>[...f,{id:fid,x,y,color:c}]);
      setTimeout(()=>setFireworks(f=>f.filter(fw=>fw.id!==fid)),1400);
      const pts=Array.from({length:22},(_,a)=>({
        id:fid*100+a,x,y,
        vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*10,
        color:c,size:Math.random()*5+2,
      }));
      setParticles(p=>[...p,...pts]);
      setTimeout(()=>setParticles(p=>p.filter(pt=>!pts.find(pp=>pp.id===pt.id))),1200);
    },500);
  },[]);

  useEffect(()=>()=>{if(fwInterval.current)clearInterval(fwInterval.current)},[]);

  function handleNameKey(e){if(e.key==='Enter'&&nameVal)startLoading();}
  function dotClick(i){
    if(exitDir)return;
    setExitDir(i>photoIdx?'right':'left');
    setTimeout(()=>{setPhotoIdx(i);setExitDir(null);},380);
  }

  return jj('div',{style:{position:'relative',width:'100vw',height:'100dvh',overflow:'hidden',background:'#060610',color:'#e0f7fa',fontFamily:'"Exo 2",sans-serif'}},
    $('audio',{ref:audioRef,loop:true},$('source',{src:'musik.mp3',type:'audio/mpeg'})),

    // ── INTRO ──
    screen==='intro'&&jj('div',{className:'screen screen-intro'},
      $('div',{className:'grid-bg'}),
      $('div',{className:'stars-layer'}),
      jj('div',{className:`intro-content${isGlitch?' glitch':''}`},
        $('div',{className:'game-eyebrow'},'◆ WELCOME TO ◆'),
        jj('div',{className:'game-logo'},
          $('span',{className:'logo-bracket'},'['),
          $('span',{className:'logo-text'},'JEJS'),
          $('span',{className:'logo-bracket'},']'),
        ),
        $('div',{className:'game-title'},'THE INFINITE WORLD'),
        jj('div',{className:'game-subtitle'},
          $('span',null,typedText),
          $('span',{className:'cursor'},'█'),
        ),
        $('div',{className:'decorative-line'},'◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆'),
        $('button',{className:'btn-start',onClick:()=>setScreen('name')},'▶ START GAME'),
        $('div',{className:'version-tag'},'VER. 24.12 — SPECIAL EDITION'),
      ),
      $('div',{className:'corner-deco tl'},'╔══╗'),
      $('div',{className:'corner-deco tr'},'╔══╗'),
      $('div',{className:'corner-deco bl'},'╚══╝'),
      $('div',{className:'corner-deco br'},'╚══╝'),
    ),

    // ── NAME ──
    screen==='name'&&jj('div',{className:'screen screen-name'},
      $('div',{className:'grid-bg dim'}),
      jj('div',{className:'name-panel'},
        $('div',{className:'panel-header'},'► PLAYER IDENTIFICATION'),
        jj('div',{className:'panel-body'},
          jj('div',{className:'id-row'},
            $('span',{className:'id-label'},'USER_ID :'),
            $('span',{className:'id-value'},nameVal.toUpperCase()||'________'),
          ),
          $('input',{
            className:'name-input',type:'text',
            placeholder:'ENTER YOUR NAME...',
            value:nameVal,
            onChange:e=>setNameVal(e.target.value),
            onKeyDown:handleNameKey,
            maxLength:12,autoFocus:true,
          }),
          $('div',{className:'name-hint'},'※ YOUR WORLD HAS BEEN FOUND ※'),
          $('button',{
            className:'btn-validate',
            onClick:()=>nameVal&&startLoading(),
            disabled:!nameVal,
          },'▶ VALIDATE & ENTER'),
        ),
      ),
    ),

    // ── LOADING ──
    screen==='loading'&&jj('div',{className:'screen screen-loading'},
      $('div',{className:'grid-bg dim'}),
      jj('div',{className:'loading-content'},
        jj('div',{className:'loading-spinner-wrap'},
          ...[...Array(8)].map((_,i)=>$('div',{
            key:i,className:'sp-bar',
            style:{transform:`rotate(${45*i}deg)`,animationDelay:`${0.125*i}s`},
          })),
        ),
        $('div',{className:'loading-stage'},LOADING_STAGES[stageIdx].text),
        jj('div',{className:'loading-bar-wrap'},
          jj('div',{className:'loading-bar-track'},
            $('div',{className:'loading-bar-fill',style:{width:`${loadPct}%`}}),
          ),
          $('div',{className:'loading-pct'},loadPct,'%'),
        ),
        jj('div',{className:'loading-log'},
          LOADING_STAGES.slice(0,stageIdx+1).map((s,i)=>
            jj('div',{key:i,className:'log-line'},
              $('span',{className:'log-ok'},'[OK]'),' ',s.text
            )
          ),
        ),
        jj('div',{className:'loading-player'},'PLAYER: ',$('span',null,(nameVal||'UNKNOWN').toUpperCase())),
      ),
    ),

    // ── REVEAL ──
    screen==='reveal'&&jj('div',{className:'screen screen-reveal'},
      $('div',{className:'wishes-rain'},
        wishes.map(w=>$('div',{
          key:w.id,className:'wish-item',
          style:{left:`${w.x}%`,animationDuration:`${w.dur}s`,animationDelay:`${w.delay}s`,fontSize:`${w.size}px`},
        },w.text)),
      ),
      showTitle&&jj('div',{className:'reveal-title-wrap'},
        $('div',{className:'reveal-badge'},'✦ SPECIAL EVENT UNLOCKED ✦'),
        jj('h1',{className:'reveal-title'},
          $('span',{className:'rt-1'},'SELAMAT'),
          $('span',{className:'rt-2'},'ULANG TAHUN'),
          $('span',{className:'rt-3'},PLAYER_NAME,'!'),
        ),
      ),
      showQuestion&&jj('div',{className:'reveal-question'},
        $('p',{className:'q-text'},'Apakah kamu siap menerima hadiah?'),
        jj('div',{className:'q-buttons'},
          jj('button',{className:'btn-answer',onClick:goPhotos},
            $('span',{className:'ans-main'},'YA'),
            $('span',{className:'ans-sub'},'tentu saja'),
          ),
          jj('button',{className:'btn-answer alt',onClick:goPhotos},
            $('span',{className:'ans-main'},'YES'),
            $('span',{className:'ans-sub'},'of course'),
          ),
        ),
      ),
    ),

    // ── PHOTOS ──
    screen==='photos'&&jj('div',{
      className:'screen screen-photos',
      onTouchStart:e=>{touchStart.current=e.touches[0].clientX},
      onTouchEnd:e=>{
        if(touchStart.current===null)return;
        const dx=e.changedTouches[0].clientX-touchStart.current;
        if(Math.abs(dx)>40)navigate(dx<0?'right':'left');
        touchStart.current=null;
      },
    },
      // HUD
      jj('div',{className:'photo-hud'},
        $('div',{className:'hud-title'},'◈ MEMORY ARCHIVE'),
        $('div',{className:'hud-counter'},
          String(photoIdx+1).padStart(2,'0'),' / ',String(PHOTOS.length).padStart(2,'0'),
        ),
      ),

      // Stage
      jj('div',{className:'photo-stage'},
        $('div',{
          className:'photo-bg',
          style:{backgroundImage:`url(foto${photoIdx+1}.png)`},
        }),
        jj('div',{className:'photo-main'},
          jj('div',{className:'photo-card-wrap'},
            jj('div',{className:`photo-card ${exitDir==='right'?'exit-left':exitDir==='left'?'exit-right':'enter'}`},
              $('div',{className:'pc tl'}),
              $('div',{className:'pc tr'}),
              $('div',{className:'pc bl'}),
              $('div',{className:'pc br'}),
              jj('div',{className:'photo-img-wrap'},
                $('img',{
                  src:PHOTOS[photoIdx].src,
                  alt:`Memory ${photoIdx+1}`,
                  className:'photo-img',
                  onError:e=>{
                    const img=e.target;
                    img.style.display='none';
                    const wrap=img.parentElement;
                    if(!wrap.querySelector('.photo-fallback')){
                      const bgs=['linear-gradient(135deg,#1a1a2e,#533483)','linear-gradient(135deg,#0f3460,#16213e)','linear-gradient(135deg,#2d6a4f,#1b4332)','linear-gradient(135deg,#6b4226,#3d405b)','linear-gradient(135deg,#1a1a2e,#2d6a4f)','linear-gradient(135deg,#533483,#0f3460)','linear-gradient(135deg,#3d405b,#1b4332)','linear-gradient(135deg,#16213e,#6b4226)','linear-gradient(135deg,#2d6a4f,#533483)','linear-gradient(135deg,#0d0d2b,#16213e)'];
                      const d=document.createElement('div');
                      d.className='photo-fallback';
                      d.style.background=bgs[photoIdx%bgs.length];
                      d.innerHTML=`<div class="fb-icon">📷</div><div class="fb-label">MEMORY #${String(photoIdx+1).padStart(2,'0')}</div>`;
                      wrap.appendChild(d);
                    }
                  },
                }),
              ),
              jj('div',{className:'photo-meta'},
                $('div',{className:'photo-caption'},CAPTIONS[photoIdx]),
                $('div',{className:'photo-num'},PHOTOS[photoIdx].label),
              ),
            ),
          ),
        ),
        $('button',{className:'photo-nav-btn prev',onClick:()=>navigate('left'),'aria-label':'Previous'},'‹'),
        $('button',{className:'photo-nav-btn next',onClick:()=>navigate('right'),'aria-label':'Next'},'›'),
      ),

      // Dots
      $('div',{className:'photo-strip'},
        PHOTOS.map((_,i)=>$('button',{
          key:i,
          className:`strip-dot${i===photoIdx?' active':''}`,
          onClick:()=>dotClick(i),
        })),
      ),

      $('div',{className:'swipe-hint'},'← swipe to navigate →'),

      // Surprise — part of flex column, no overlap
      showSurprise&&jj('div',{className:'surprise-bar'},
        jj('button',{className:'btn-surprise',onClick:goFinal},
          $('span',{className:'surprise-star'},'★'),
          $('span',{className:'surprise-label'},'SURPRISE'),
        ),
      ),
    ),

    // ── FINAL ──
    screen==='final'&&jj('div',{className:'screen screen-final'},
      jj('div',{className:'fw-layer'},
        fireworks.map(fw=>$('div',{
          key:fw.id,className:'firework',
          style:{left:`${fw.x}%`,top:`${fw.y}%`,'--c':fw.color},
        })),
        particles.map(pt=>$('div',{
          key:pt.id,className:'particle',
          style:{left:`${pt.x}%`,top:`${pt.y}%`,width:pt.size,height:pt.size,background:pt.color,'--vx':`${pt.vx}vw`,'--vy':`${pt.vy}vh`},
        })),
      ),
      jj('div',{className:'final-content'},
        $('div',{className:'final-stars'},'✦ ✦ ✦ ✦ ✦'),
        $('h1',{className:'final-title'},'Selamat Ulang Tahun'),
        $('h2',{className:'final-name'},PLAYER_NAME,'!'),
        jj('p',{className:'final-msg'},
          'Semoga hari ini dan setiap hari berikutnya',$('br',null),'dipenuhi dengan kebahagiaan yang tulus. 🎂'
        ),
        $('p',{className:'final-small'},'Maaf hadiahnya cuman ginian 😅'),
        $('div',{className:'final-badge'},'— With love, from your friend —'),
      ),
    ),
  );
}

createRoot(document.getElementById('root')).render($('div',null,$(App,null)));
</script>
</body>
</html>
