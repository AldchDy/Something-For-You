<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Gift for Jejs</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8e44ad; --secondary: #2c3e50; }
        body, html { margin: 0; padding: 0; min-height: 100vh; font-family: 'Poppins', sans-serif; background: radial-gradient(circle, #2c3e50 0%, #000000 100%); color: #fff; overflow: hidden; }
        
        .screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: absolute; width: 100%; transition: all 0.8s ease; }
        .hidden { opacity: 0; visibility: hidden; transform: translateY(20px); }
        
        /* Buttons */
        .btn-pixel { padding: 15px 35px; background: var(--primary); border: 2px solid #fff; color: white; cursor: pointer; font-family: 'Press Start 2P', cursive; font-size: 12px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-pixel:hover { transform: scale(1.05); background: #9b59b6; }

        /* Loading */
        #loading-container { width: 280px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 20px; overflow: hidden; }
        #loading-bar { height: 100%; width: 0%; background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        /* Hujan Tulisan */
        .falling-text { position: absolute; top: -50px; font-weight: bold; color: rgba(255,255,255,0.8); white-space: nowrap; animation: fall linear forwards; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* Photo Slider Optimized for Portrait */
        .photo-wrapper { position: relative; width: 90%; max-width: 400px; height: 70vh; border: 5px solid #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 0 30px rgba(142, 68, 173, 0.5); background: #111; }
        .photo-wrapper img { width: 100%; height: 100%; object-fit: contain; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(142, 68, 173, 0.7); border: none; color: white; padding: 15px 10px; cursor: pointer; font-weight: bold; border-radius: 5px; }

        /* Final Screen */
        .final-msg h1 { font-size: 2.5rem; color: #f1c40f; text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); margin-bottom: 10px; }
        .final-msg p { font-style: italic; opacity: 0.9; }
        
        #btn-surprise { position: fixed; bottom: 30px; right: 30px; width: 80px; height: 80px; background: #e74c3c; border: none; border-radius: 50%; color: white; font-weight: bold; cursor: pointer; animation: pulse 1.5s infinite; z-index: 100; box-shadow: 0 0 20px rgba(231, 76, 60, 0.5); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <audio id="ultahLagu" src="musik.mp3" loop></audio>

    <!-- SCREEN 1: START -->
    <div id="screen1" class="screen">
        <h2 style="font-family: 'Press Start 2P'; color: #f1c40f;">QUEST #01</h2>
        <p>A gift is waiting for you...</p>
        <button class="btn-pixel" onclick="nextScreen(1, 2)">START</button>
    </div>

    <!-- SCREEN 2: INPUT -->
    <div id="screen2" class="screen hidden">
        <h2 style="font-family: 'Press Start 2P';">WHO ARE YOU?</h2>
        <input type="text" id="playerName" placeholder="Enter name..." style="padding: 12px; border-radius: 5px; border: none; width: 200px; margin: 20px; text-align: center;">
        <button class="btn-pixel" onclick="startLoading()">CONFIRM</button>
    </div>

    <!-- SCREEN 3: LOADING -->
    <div id="screen3" class="screen hidden">
        <h2 id="status-text" style="font-size: 14px;">PREPARING THE SURPRISE...</h2>
        <div id="loading-container"><div id="loading-bar"></div></div>
        <p id="loading-text" style="font-size: 12px; margin-top: 10px;">0%</p>
    </div>

    <!-- SCREEN 4: RAIN & TITLE -->
    <div id="screen4" class="screen hidden">
        <div id="hujan-container"></div>
        <h1 id="judul-utama" class="hidden" style="font-size: 2.5rem; color: #f1c40f; z-index: 20; font-family: 'Press Start 2P';">HAPPY BIRTHDAY!</h1>
        <div id="siap-hadiah" class="hidden" style="z-index: 20; margin-top: 30px;">
            <p>Ready to see your gift?</p>
            <button class="btn-pixel" onclick="showPhotos()">YA</button>
            <button class="btn-pixel" onclick="showPhotos()" style="background: #34495e;">YES</button>
        </div>
    </div>

    <!-- SCREEN 5: SLIDER -->
    <div id="screen5" class="screen hidden">
        <div class="photo-wrapper">
            <img id="main-photo" src="foto1.png">
            <button class="nav-btn" style="left: 10px;" onclick="changePhoto(-1)">❮</button>
            <button class="nav-btn" style="right: 10px;" onclick="changePhoto(1)">❯</button>
        </div>
        <p id="photo-index" style="margin-top: 15px; font-weight: bold;">Memory 1 of 10</p>
        <button id="btn-surprise" class="hidden" onclick="showFinal()">PUSH!</button>
    </div>

    <!-- SCREEN 6: FINAL MESSAGE -->
    <div id="screen6" class="screen hidden final-msg">
        <h1>Selamat Ulang Tahun Jejs!</h1>
        <p>Doa terbaik buat kamu.</p>
        <p style="font-size: 0.8rem; margin-top: 5px;">Maaf hadiahnya cuman ginian.</p>
    </div>

    <script>
        let currentPhoto = 1;

        function nextScreen(curr, next) {
            document.getElementById('screen' + curr).classList.add('hidden');
            setTimeout(() => {
                document.getElementById('screen' + curr).style.display = 'none';
                document.getElementById('screen' + next).classList.remove('hidden');
            }, 800);
        }

        function startLoading() {
            nextScreen(2, 3);
            let progress = 0;
            let interval = setInterval(() => {
                progress += 1;
                document.getElementById('loading-bar').style.width = progress + "%";
                document.getElementById('loading-text').innerText = progress + "%";
                if (progress >= 100) {
                    clearInterval(interval);
                    startBirthday();
                }
            }, 40);
        }

        function startBirthday() {
            nextScreen(3, 4);
            document.getElementById('ultahLagu').play();
            
            const wishes = ["Happy Birthday", "Selamat Ulang Tahun", "Sugeng Ambal Warsa", "Otanjoubi Omedetou", "Saeng-il Chukha", "Joyeux Anniversaire", "Alles Gute", "Feliz Cumpleaños", "Buon Compleanno", "Tillykke med fødselsdagen", "Grattis på födelsedagen", "Sveikinu su gimtadieniu", "Boldog születésnapot", "Parabéns", "Gelukkige verjaardag"];
            
            let count = 0;
            let rainInterval = setInterval(() => {
                const text = document.createElement('div');
                text.className = 'falling-text';
                text.innerText = wishes[Math.floor(Math.random() * wishes.length)];
                text.style.left = Math.random() * 85 + "vw";
                text.style.fontSize = Math.random() * (25 - 15) + 15 + "px";
                text.style.animationDuration = (Math.random() * 3 + 3) + "s";
                document.getElementById('hujan-container').appendChild(text);
                count++;
                if (count > 50) clearInterval(rainInterval);
            }, 200);

            setTimeout(() => {
                document.getElementById('judul-utama').classList.remove('hidden');
                setTimeout(() => { document.getElementById('siap-hadiah').classList.remove('hidden'); }, 2500);
            }, 3500);
        }

        function showPhotos() {
            nextScreen(4, 5);
            setTimeout(() => { document.getElementById('btn-surprise').classList.remove('hidden'); }, 4000);
        }

        function changePhoto(dir) {
            currentPhoto += dir;
            if (currentPhoto < 1) currentPhoto = 10;
            if (currentPhoto > 10) currentPhoto = 1;
            document.getElementById('main-photo').src = `foto${currentPhoto}.png`;
            document.getElementById('photo-index').innerText = `Memory ${currentPhoto} of 10`;
        }

        function showFinal() {
            nextScreen(5, 6);
            setInterval(celebrate, 1000);
        }

        function celebrate() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#8e44ad', '#f1c40f', '#e74c3c'] });
        }
    </script>
</body>
</html>
